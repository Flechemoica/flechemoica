<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Essayer — Flèche-moi ça</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="/assets/images/favicon.ico">
  <link rel="apple-touch-icon" href="/assets/images/icon.png?v=9">
  <meta name="theme-color" content="#000000">
</head>
<script>
  document.addEventListener('contextmenu', (event) => {
    event.preventDefault();
  });
</script>
<body>
  <div class="xp-desktop">
    <div class="xp-window grid-window">

        <div class="xp-titlebar">
            <div class="xp-title">
            <img src="/assets/images/icon.png?v=9" alt="" class="titlebar-icon">
            <span>Flèche-moi ça.exe</span>
        </div>

        <div class="xp-window-buttons">
          <button aria-label="Réduire">_</button>
          <button aria-label="Agrandir">□</button>
          <button aria-label="Fermer">×</button>
        </div>
      </div>

      <div class="xp-menu-bar">
        <a href="/" class="menu-link">Accueil</a>
<a href="/grilletest.html" class="menu-link">Essayer</a>
<button type="button" class="menu-contact finish-menu-link" id="finish-button" hidden>Terminer</button>
<a href="mailto:contact@flechemoica.fr" class="menu-contact">Contact</a>
      </div>

      <header class="xp-header grid-header">
      </header>

      <main class="grid-page">
        <section class="crossword-wrap" aria-label="Grille de mots fléchés">
          <div class="game-start-panel card" id="game-start-panel">
            <h2>Accès privé 🔐</h2>
            <form class="access-form" id="access-form">
              <input
                type="password"
                class="newsletter-input"
                id="access-code"
                placeholder="Code d’accès"
                autocomplete="off"
                required
              >
              <button type="submit" class="xp-button" id="access-button">Valider</button>
            </form>
            <p class="access-error" id="access-error" hidden></p>
            <button type="button" class="xp-button" id="play-button" hidden>Jouer</button>
          </div>

          <div class="game-timer" id="game-timer">00:00</div>

          <div class="crossword-grid game-blurred" id="crossword-grid"></div>
        </section>
      </main>

      <footer class="site-footer">
        <span>© 2026 Flèche-moi ça</span>


        <a href="/mentions-legales.html">Mentions légales</a>
      </footer>

    </div>
  </div>

  <script>
    const JSON_FILE = 'grille1.json';
    const SUPABASE_URL = 'https://tkgvmiykmoflzufjluwt.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrZ3ZtaXlrbW9mbHp1ZmpsdXd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5Mjc0NjQsImV4cCI6MjA5NDUwMzQ2NH0.alIij_j4mlih9dUY5dtqNRBLk7p6Q-Jkto2Sra9V6MQ';
    const NEWSLETTER_TABLE = 'newsletter_emails';
    const ACCESS_RPC = 'check_access_code';

    let timerInterval = null;
    let timerStartTime = null;

    function formatElapsedTime(milliseconds) {
      const totalSeconds = Math.floor(milliseconds / 1000);
      const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
      const seconds = String(totalSeconds % 60).padStart(2, '0');

      return `${minutes}:${seconds}`;
    }

    function startTimer() {
      const timer = document.getElementById('game-timer');
      timerStartTime = Date.now();
      timer.textContent = '00:00';

      timerInterval = setInterval(() => {
        timer.textContent = formatElapsedTime(Date.now() - timerStartTime);
      }, 250);
    }

    window.checkAccessCode = async function(code) {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${ACCESS_RPC}`, {
        method: 'POST',
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          access_code: code
        })
      });

      const resultText = await response.text();

      if (!response.ok) {
        console.error('Erreur Supabase check_access_code:', response.status, resultText);
        throw new Error(`Erreur Supabase ${response.status}`);
      }

      return resultText === 'true';
    };

    async function saveNewsletterEmail(email, solvedIn) {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/${NEWSLETTER_TABLE}`, {
        method: 'POST',
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          Prefer: 'return=minimal'
        },
        body: JSON.stringify({
          email,
          solved_in: solvedIn,
          page: window.location.pathname
        })
      });

      if (!response.ok) {
        throw new Error('Impossible d’enregistrer cette adresse mail.');
      }
    }

    function parseWord(word) {
      const letters = [];
      const separators = [];

      [...word].forEach((character) => {
        if (character === ' ' || character === '-' || character === '‑') {
          if (letters.length > 0) {
            separators.push(letters.length - 1);
          }
          return;
        }

        letters.push(character);
      });

      return { letters, separators };
    }

    function arrowForDirection(direction) {
      if (direction.rowDelta === 1 && direction.columnDelta === 0) {
        return direction.startColumnDelta === 1 ? 'corner-down-right' : 'down';
      }

      if (direction.rowDelta === 0 && direction.columnDelta === 1) {
        return direction.startRowDelta === 1 ? 'corner-right-down' : 'right';
      }

      return 'right';
    }

    async function loadGridData() {
      const response = await fetch(JSON_FILE);

      if (!response.ok) {
        throw new Error(`Impossible de charger ${JSON_FILE}`);
      }

      return response.json();
    }

    function buildGrid(data) {
      const cells = new Map();
      const wordCellMap = new Map();
      let maxRow = 0;
      let maxColumn = 0;
      let definitionCount = 0;

      data.placedWords.forEach((placedWord, wordIndex) => {
        const { definitionCell, direction, word, definitions } = placedWord;
        const parsedWord = parseWord(word);
        const startColumn = definitionCell.column + direction.startColumnDelta;
        const startRow = definitionCell.row + direction.startRowDelta;
        const definitionKey = `${definitionCell.column},${definitionCell.row}`;
        const wordId = `word-${wordIndex}`;
        definitionCount += 1;
        const wordCells = [];

        if (!cells.has(definitionKey)) {
          cells.set(definitionKey, {
            type: 'definition',
            clues: []
          });
        }

        const definitionCellData = cells.get(definitionKey);
        const definitionText = definitions.length ? definitions[0] : 'Définition à venir';
        const arrow = arrowForDirection(direction);

        definitionCellData.clues.push({
          text: definitionText,
          arrow,
          wordId,
          startRowDelta: direction.startRowDelta,
          startColumnDelta: direction.startColumnDelta,
          rowDelta: direction.rowDelta,
          columnDelta: direction.columnDelta
        });

        maxColumn = Math.max(maxColumn, definitionCell.column);
        maxRow = Math.max(maxRow, definitionCell.row);

        parsedWord.letters.forEach((letter, index) => {
          const column = startColumn + direction.columnDelta * index;
          const row = startRow + direction.rowDelta * index;
          const key = `${column},${row}`;
          const separatorAfter = parsedWord.separators.includes(index);

          wordCells.push(key);

          const existingCell = cells.get(key);

          if (existingCell && existingCell.type === 'letter') {
            existingCell.wordIds.push(wordId);
            existingCell.separatorAfter = existingCell.separatorAfter || separatorAfter;
          } else {
            cells.set(key, {
              type: 'letter',
              letter,
              separatorAfter,
              direction,
              wordIds: [wordId]
            });
          }

          maxColumn = Math.max(maxColumn, column);
          maxRow = Math.max(maxRow, row);
        });

        const lastClue = definitionCellData.clues[definitionCellData.clues.length - 1];
        lastClue.wordCells = wordCells;
        wordCellMap.set(wordId, wordCells);
      });

      const grid = document.getElementById('crossword-grid');
      grid.innerHTML = '';
      grid.dataset.definitionCount = definitionCount;

      const columnCount = maxColumn + 1;
      const rowCount = maxRow + 1;
      grid.parentElement.style.setProperty('--grid-ratio', `${columnCount} / ${rowCount}`);
      grid.style.gridTemplateColumns = `repeat(${columnCount}, minmax(0, 1fr))`;

      for (let row = 0; row <= maxRow; row += 1) {
        for (let column = 0; column <= maxColumn; column += 1) {
          const key = `${column},${row}`;
          const cellData = cells.get(key);
          const cell = document.createElement('div');
          cell.classList.add('grid-cell');

          if (!cellData) {
            cell.classList.add('empty-cell');
            cell.innerHTML = `
              <input
                class="letter-input"
                type="text"
                inputmode="text"
                maxlength="1"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="characters"
                spellcheck="false"
                aria-label="Lettre"
                disabled
              >
            `;
          } else if (cellData.type === 'definition') {
            cell.classList.add('definition-cell');

            if (cellData.clues.length > 1) {
              cell.classList.add('double-definition-cell');
            }

            const orderedClues = [...cellData.clues].sort((a, b) => {
              const order = {
                'corner-down-right': 0,
                down: 1,
                right: 2,
                'corner-right-down': 3
              };

              return (order[a.arrow] ?? 0) - (order[b.arrow] ?? 0);
            });

            cell.innerHTML = orderedClues.map((clue) => `
              <button type="button" class="definition-item definition-${clue.arrow}" data-word-id="${clue.wordId}">
                <span class="definition-text">${clue.text}</span>
                <span class="definition-arrow arrow-${clue.arrow}"></span>
              </button>
            `).join('');
          } else {
            cell.classList.add('letter-cell');

            if (cellData.separatorAfter) {
              if (cellData.direction.rowDelta === 0 && cellData.direction.columnDelta === 1) {
                cell.classList.add('separator-right');
              }

              if (cellData.direction.rowDelta === 1 && cellData.direction.columnDelta === 0) {
                cell.classList.add('separator-bottom');
              }
            }

            cell.dataset.wordIds = cellData.wordIds.join(' ');
            cell.dataset.cellKey = key;
            cell.innerHTML = `
              <input
                class="letter-input"
                type="text"
                inputmode="text"
                maxlength="1"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="characters"
                spellcheck="false"
                aria-label="Lettre"
                disabled
              >
            `;
          }

          grid.appendChild(cell);
        }
      }

      let activeWordId = null;

      grid.querySelectorAll('.letter-input').forEach((input) => {
        input.addEventListener('keydown', (event) => {
          if (event.key === ' ') {
            event.preventDefault();
            return;
          }

          if (event.key !== 'Backspace' || !activeWordId) {
            return;
          }

          const activeWordCells = wordCellMap.get(activeWordId) || [];
          const currentCell = input.closest('.grid-cell');
          const currentCellKey = currentCell?.dataset.cellKey;
          const currentIndex = activeWordCells.indexOf(currentCellKey);

          if (input.value) {
            input.value = '';
            event.preventDefault();
            return;
          }

          const previousCellKey = activeWordCells[currentIndex - 1];

          if (previousCellKey) {
            const previousInput = grid.querySelector(`[data-cell-key="${previousCellKey}"] .letter-input`);

            if (previousInput) {
              previousInput.focus();
              previousInput.value = '';
            }

            event.preventDefault();
          }
        });

        input.addEventListener('input', () => {
          input.value = input.value.replace(/\s/g, '').slice(0, 1).toUpperCase();

          if (!activeWordId || !input.value) {
            return;
          }

          const activeWordCells = wordCellMap.get(activeWordId) || [];
          const currentCell = input.closest('.grid-cell');
          const currentCellKey = currentCell?.dataset.cellKey;
          const currentIndex = activeWordCells.indexOf(currentCellKey);
          const nextCellKey = activeWordCells[currentIndex + 1];

          if (nextCellKey) {
            const nextInput = grid.querySelector(`[data-cell-key="${nextCellKey}"] .letter-input`);

            if (nextInput) {
              nextInput.focus();
              nextInput.select();
            }

            return;
          }

          grid.querySelectorAll('.letter-input').forEach((letterInput) => {
            letterInput.disabled = true;
            letterInput.blur();
          });

          grid.querySelectorAll('.grid-cell').forEach((gridCell) => {
            gridCell.classList.remove('word-highlighted');
          });

          grid.querySelectorAll('.definition-item').forEach((item) => {
            item.classList.remove('definition-selected');
          });

          activeWordId = null;
        });
      });

      grid.querySelectorAll('.definition-item').forEach((definitionButton) => {
        definitionButton.addEventListener('click', () => {
          const selectedWordId = definitionButton.dataset.wordId;
          activeWordId = selectedWordId;

          grid.querySelectorAll('.definition-item').forEach((item) => {
            item.classList.toggle('definition-selected', item.dataset.wordId === selectedWordId);
          });

          grid.querySelectorAll('.letter-input').forEach((input) => {
            input.disabled = true;
          });

          grid.querySelectorAll('.grid-cell').forEach((gridCell) => {
            const wordIds = (gridCell.dataset.wordIds || '').split(' ');
            const isSelectedWordCell = wordIds.includes(selectedWordId);
            gridCell.classList.toggle('word-highlighted', isSelectedWordCell);

            const input = gridCell.querySelector('.letter-input');

            if (input && isSelectedWordCell) {
              input.disabled = false;
            }
          });

          const firstInput = grid.querySelector('.word-highlighted .letter-input');

          if (firstInput) {
            firstInput.focus();
            firstInput.select();
          }
        });
      });
    }

    async function initGrid() {
      try {
        const gridData = await loadGridData();
        buildGrid(gridData);
      } catch (error) {
        console.error(error);
        document.getElementById('crossword-grid').innerHTML = `
          <div class="grid-error">
            Impossible de charger la grille.<br>
            Vérifie que le fichier <strong>${JSON_FILE}</strong> existe bien.
          </div>
        `;
      }
      const startPanel = document.getElementById('game-start-panel');
      const accessForm = document.getElementById('access-form');
      const accessCodeInput = document.getElementById('access-code');
      const accessButton = document.getElementById('access-button');
      const accessError = document.getElementById('access-error');
      const playButton = document.getElementById('play-button');
      const finishButton = document.getElementById('finish-button');
      const grid = document.getElementById('crossword-grid');
      const timer = document.getElementById('game-timer');

      grid.classList.add('game-blurred');
      timer.classList.add('game-not-started');

      accessForm.addEventListener('submit', async (event) => {
        event.preventDefault();

        const code = accessCodeInput.value.trim();

        if (!code) {
          accessCodeInput.reportValidity();
          return;
        }

        accessButton.disabled = true;
        accessButton.textContent = 'Vérification...';
        accessError.hidden = true;
        accessError.textContent = '';

        try {
          const isAllowed = await window.checkAccessCode(code);

          if (!isAllowed) {
            throw new Error('Code incorrect.');
          }

          accessForm.remove();
          accessError.remove();
          playButton.hidden = false;
          startPanel.querySelector('h2').textContent = 'Essaie une de nos grilles ✨';
          startPanel.querySelector('p').textContent = 'Clique sur Jouer pour lancer la partie.';
        } catch (error) {
          console.error(error);
          accessButton.disabled = false;
          accessButton.textContent = 'Valider';
          accessError.hidden = false;
          accessError.textContent = `${error.message} — vérifie que la fonction check_access_code existe dans Supabase.`;
        }
      });

      playButton.addEventListener('click', () => {
        startPanel.classList.add('game-start-hidden');
        grid.classList.remove('game-blurred');
        timer.classList.remove('game-not-started');
        finishButton.hidden = false;
        startTimer();
      });

      finishButton.addEventListener('click', () => {
        grid.querySelectorAll('.letter-cell .letter-input').forEach((input) => {
          if (!input.value) {
            input.value = 'X';
          }

          input.disabled = true;
          input.blur();
        });

        grid.querySelectorAll('.grid-cell').forEach((gridCell) => {
          gridCell.classList.remove('word-highlighted');
        });

        grid.querySelectorAll('.definition-item').forEach((item) => {
          item.classList.remove('definition-selected');
        });

        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }

        grid.classList.add('game-blurred');
        timer.classList.add('game-not-started');
        finishButton.disabled = true;

        const finalTime = timer.textContent;

        startPanel.classList.remove('game-start-hidden');
        startPanel.innerHTML = `
          <h2>Félicitations ! ✨</h2>
          <p>La grille a été résolue en <strong>${finalTime}</strong>.</p>
          <p id="newsletter-text">Inscris ton adresse mail pour être prévenu.</p>
          <form class="newsletter-form" id="newsletter-form">
            <input
              type="email"
              class="newsletter-input"
              id="newsletter-email"
              placeholder="votre@email.fr"
              autocomplete="email"
              required
            >
            <button type="submit" class="xp-button">S'inscrire</button>
          </form>
        `;

        const newsletterForm = document.getElementById('newsletter-form');

        newsletterForm.addEventListener('submit', async (event) => {
          event.preventDefault();

          const emailInput = document.getElementById('newsletter-email');
          const newsletterText = document.getElementById('newsletter-text');
          const submitButton = newsletterForm.querySelector('button[type="submit"]');
          const email = emailInput.value.trim().toLowerCase();

          if (!emailInput.checkValidity()) {
            emailInput.reportValidity();
            return;
          }

          submitButton.disabled = true;
          submitButton.textContent = 'Inscription...';

          try {
            await saveNewsletterEmail(email, finalTime);

            if (newsletterText) {
              newsletterText.remove();
            }

            newsletterForm.innerHTML = `
              <p>Merci et à bientôt !</p>
            `;
          } catch (error) {
            console.error(error);
            submitButton.disabled = false;
            submitButton.textContent = "S'inscrire";

            let errorText = document.getElementById('newsletter-error');

            if (!errorText) {
              errorText = document.createElement('p');
              errorText.id = 'newsletter-error';
              errorText.className = 'newsletter-error';
              newsletterForm.appendChild(errorText);
            }

            errorText.textContent = 'Oups, impossible d’enregistrer ton adresse pour le moment.';
          }
        });
      });
    }

    initGrid();
  </script>
</body>
</html>
