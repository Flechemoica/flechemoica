<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flèche-moi ça</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="/assets/images/favicon.ico?">
  <link rel="apple-touch-icon" href="/assets/images/icon.png?">
  <meta name="theme-color" content="#d3c9f5">
</head>
<script>
  document.addEventListener('contextmenu', (event) => {
    event.preventDefault();
  });
</script>
<body>
  <div class="xp-desktop">
    <div class="xp-window">

      <div class="xp-titlebar">
        <div class="xp-title">
          <img src="/assets/images/icon.png?v=9" alt="" class="titlebar-icon">
          <span>Flèche-moi ça.exe</span>
        </div>

        <div class="xp-window-buttons">
          <button aria-label="Réduire">_</button>
          <button aria-label="Agrandir">□</button>
          <button aria-label="Fermer">×</button>
        </div>
      </div>

      <div class="xp-menu-bar">
        <a href="/" class="menu-link">Accueil</a>
        <a href="/grilletest.html" class="menu-link" id="test-link" style="display:none;">Essayer</a>
        <a href="mailto:contact@flechemoica.fr" class="menu-contact" style="margin-left:auto;" aria-label="Envoyer un mail">Contact</a>
      </div>

      <header class="xp-header"></header>

      <main class="container">
        <section class="card">
          <h2>Ça arrive bientôt !</h2>

          <p>
            En attendant, tu peux envoyer un Wizz.
          </p>

          <p class="wizz-counter">
            Wizz envoyés : <span id="wizz-count">0</span>
          </p>

          <button class="xp-button wizz-button" id="wizz-button" type="button" aria-label="Envoyer un Wizz">
            🫨
          </button>
        </section>
      </main>

      <footer class="site-footer">
        <span>© 2026 Flèche-moi ça</span>
        <a href="/mentions-legales.html">Mentions légales</a>
        <a href="/privacy.html">Confidentialité</a>
      </footer>

    </div>
  </div>

  <script>
    const WIZZ_API_URL = 'https://withered-mountain-e272.lrphoton-stats.workers.dev';
    const wizzButton = document.getElementById('wizz-button');
    const wizzCount = document.getElementById('wizz-count');
    const testLink = document.getElementById('test-link');

    if (
      window.location.hostname === '127.0.0.1' ||
      window.location.hostname === 'localhost'
    ) {
      testLink.style.display = '';
    }

    async function loadCount() {
      try {
        const response = await fetch(WIZZ_API_URL, {
          method: 'GET',
          headers: {
            Accept: 'application/json',
          },
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        wizzCount.textContent = Number(data.count || 0);
      } catch (error) {
        console.error('Erreur chargement Wizz :', error);
      }
    }

    async function incrementCount() {
      const current = Number(wizzCount.textContent || 0);
      const optimisticCount = current + 1;

      wizzCount.textContent = optimisticCount;

      try {
        const response = await fetch(WIZZ_API_URL, {
          method: 'POST',
          headers: {
            Accept: 'application/json',
          },
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        wizzCount.textContent = Number(data.count || optimisticCount);
      } catch (error) {
        console.error('Erreur mise à jour Wizz :', error);
        wizzCount.textContent = current;
      }
    }

    loadCount();

    wizzButton.addEventListener('click', async () => {
      await incrementCount();

      document.body.classList.remove('wizzing');
      void document.body.offsetWidth;
      document.body.classList.add('wizzing');

      setTimeout(() => {
        document.body.classList.remove('wizzing');
      }, 600);
    });
  </script>
</body>
</html>
