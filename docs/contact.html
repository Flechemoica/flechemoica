<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentions légales — Flèche-moi ça</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="/assets/images/favicon.ico?">
  <link rel="apple-touch-icon" href="/assets/images/icon.png?v=9">
  <meta name="theme-color" content="#000000">
</head>
<script>
  document.addEventListener('contextmenu', (event) => {
    event.preventDefault();
  });
</script>
<body>
  <div class="xp-desktop">
    <div class="xp-window">

            <div class="xp-titlebar">
        <div class="xp-title">
          <img src="/assets/images/icon.png?v=9" alt="" class="titlebar-icon">
          <span>Flèche-moi ça.exe</span>
        </div>

        <div class="xp-window-buttons">
          <button aria-label="Réduire">_</button>
          <button aria-label="Agrandir">□</button>
          <button aria-label="Fermer">×</button>
        </div>
      </div>

      <div class="xp-menu-bar">
        <a href="/" class="menu-link">Accueil</a>
      </div>

      <header class="xp-header">
        <h1>Contact ✉️</h1>
      </header>

      <main class="container legal-container">
        <section class="card legal-card">

            <form
                                    action="https://formsubmit.co/contact@flechemoica.fr"
                                    method="POST"
                                    enctype="multipart/form-data"
                                    style="display:flex;flex-direction:column;gap:16px;margin-top:28px;">

                                    <label for="contact-name">
                                        Nom
                                    </label>

                                    <input
                                        id="contact-name"
                                        type="text"
                                        name="Nom"
                                        autocomplete="name"
                                        required
                                        style="width:100%;box-sizing:border-box;padding:8px;">

                                    <label for="contact-email">
                                        Adresse e-mail
                                    </label>

                                    <input
                                        id="contact-email"
                                        type="email"
                                        name="email"
                                        autocomplete="email"
                                        required
                                        style="width:100%;box-sizing:border-box;padding:8px;">

                                    <label for="contact-category">
                                        Catégorie
                                    </label>

                                    <select
                                        id="contact-category"
                                        name="Catégorie"
                                        required
                                        style="width:100%;box-sizing:border-box;padding:8px;">

                                        <option value="" selected disabled>Sélectionner une catégorie</option>
                                        <option value="Question générale">Question générale</option>
                                        <option value="Suggestion">Suggestion</option>
                                        <option value="Bug ou problème technique">Bug ou problème technique</option>
                                        <option value="Compte utilisateur">Compte utilisateur</option>
                                        <option value="Partenariat ou publicité">Partenariat ou publicité</option>
                                        <option value="Données personnelles">Données personnelles</option>
                                        <option value="Autre">Autre</option>
                                    </select>

                                    <label for="contact-subject">Objet</label>

                                    <input
                                        id="contact-subject"
                                        type="text"
                                        name="Objet"
                                        required
                                        maxlength="150"
                                        style="width:100%;box-sizing:border-box;padding:8px;">

                                    <label for="contact-message">Message</label>

                                    <textarea
                                        id="contact-message"
                                        name="Message"
                                        rows="8"
                                        required
                                        maxlength="5000"
                                        style="width:100%;box-sizing:border-box;padding:8px;resize:vertical;"></textarea>

                                    <label for="contact-attachment">Pièce jointe</label>

                                    <input
                                        id="contact-attachment"
                                        type="file"
                                        name="attachment"
                                        accept=".png,.jpg,.jpeg,.gif,.webp,.pdf,.txt"
                                        style="width:100%;box-sizing:border-box;">

                                    <small>Formats acceptés : PNG, JPG, GIF, WebP, PDF ou TXT. Taille totale maximale : 10 Mo.</small>

                                    <input type="hidden" name="_subject" value="Nouveau message depuis Flèche-moi ça">
                                    <input type="hidden" name="_template" value="table">
                                    <input type="hidden" name="_next" value="https://flechemoica.fr/contact-success.html">
                                    <input type="hidden" name="_blacklist" value="viagra,casino,cryptocurrency,bitcoin,forex,loan,porn,sex,escort,backlink,guest post,SEO service">
                                        
                                        <input type="hidden" name="_captcha" value="false">

                                    <div aria-hidden="true" style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;">
                                        <label for="contact-website">Ne pas remplir ce champ</label>
                                        <input id="contact-website" type="text" name="_honey" tabindex="-1" autocomplete="off">
                                    </div>

                                    <button class="xp-button" type="submit" style="align-self:center;">
                                        Envoyer
                                    </button>

                                </form>

        </section>
      </main>

      <footer class="site-footer">
        <span>© 2026 Flèche-moi ça</span>
        <a href="/mentions-legales.html">Mentions légales</a>
        <a href="/privacy.html">Confidentialité</a>
      </footer>

    </div>
  </div>
</body>
</html>
