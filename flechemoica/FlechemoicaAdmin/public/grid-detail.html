<div class="workspace-header workspace-header-row">
  <div>
    <h2 id="grid-detail-title">Grille</h2>
    <div class="grid-detail-identity">
      <span id="grid-detail-meta"></span>
      <span class="status-badge" id="grid-detail-status-badge"></span>
    </div>
  </div>
  <p class="panel-status" id="grid-detail-status" role="status" aria-live="polite"></p>
</div>
<div class="grid-detail-layout">
  <div class="grid-detail-left">
    <section class="grid-meta-panel" aria-label="Paramètres de publication">
      <h3>Publication</h3>
      <div class="field-group">
        <label for="grid-detail-release">Date et heure</label>
        <input id="grid-detail-release" type="datetime-local" required>
      </div>
    </section>
    <section class="grid-preview" id="grid-preview" aria-label="Aperçu de la grille"></section>
    <section class="grid-actions-panel" aria-label="Gestion de l'accès à la grille">
      <h3>Gestion</h3>
      <div class="detail-actions" id="grid-detail-actions"></div>
    </section>
  </div>
  <div class="grid-detail-right">
    <form class="grid-editor" id="grid-editor-form">
      <div class="grid-editor-header">
        <h3>Mots et définitions</h3>
        <button class="primary-button compact-save-button" type="submit">Enregistrer</button>
      </div>
      <div class="grid-editor-list" id="grid-editor-list"></div>
    </form>
    <section class="grid-replace-panel" aria-label="Remplacer le JSON de la grille">
      <h3>Remplacer la grille</h3>
      <div class="json-drop-zone" id="grid-replace-drop-zone" role="button" tabindex="0">
        <strong>Importer un nouveau JSON</strong>
        <span>remplace entièrement la grille actuelle</span>
        <input id="grid-replace-file" type="file" accept="application/json,.json">
      </div>
    </section>
  </div>
</div>
