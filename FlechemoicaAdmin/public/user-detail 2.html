<div class="workspace-header workspace-header-row">
  <div>
    <h2 id="user-detail-title">Utilisateur</h2>
    <p class="panel-status" id="user-detail-meta"></p>
  </div>
  <p class="panel-status" id="user-detail-status" role="status" aria-live="polite"></p>
</div>

<div class="user-detail-layout">
  <section class="detail-panel">
    <h3>Compte</h3>
    <dl class="detail-list" id="user-account-details"></dl>
  </section>

  <section class="detail-panel">
    <h3>Gestion</h3>
    <div class="detail-actions" id="user-detail-actions"></div>
  </section>

  <section class="detail-panel detail-panel-wide">
    <h3>Grilles commencées</h3>
    <div class="detail-table-shell">
      <table class="detail-table">
        <thead>
          <tr>
            <th>Grille</th>
            <th>Temps</th>
          </tr>
        </thead>
        <tbody id="user-played-grids"></tbody>
      </table>
    </div>
  </section>

  <section class="detail-panel detail-panel-wide">
    <h3>Grilles terminées</h3>
    <div class="detail-table-shell">
      <table class="detail-table">
        <thead>
          <tr>
            <th>Grille</th>
            <th>Terminée le</th>
            <th>Temps</th>
          </tr>
        </thead>
        <tbody id="user-completed-grids"></tbody>
      </table>
    </div>
  </section>

  <section class="detail-panel detail-panel-wide">
    <h3>Grilles débloquées par pub</h3>
    <div class="detail-table-shell">
      <table class="detail-table">
        <thead>
          <tr>
            <th>Grille</th>
            <th>ID</th>
          </tr>
        </thead>
        <tbody id="user-unlocked-grids"></tbody>
      </table>
    </div>
  </section>

  <section class="detail-panel detail-panel-wide">
    <h3>Stats pubs globales</h3>
    <dl class="detail-list detail-list-four" id="user-ad-stats"></dl>
  </section>
</div>
