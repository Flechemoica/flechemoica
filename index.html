<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flèche-moi ça</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
      text-align: center;
    }

    header {
      background: #111;
      color: white;
      padding: 40px 20px;
    }

    h1 {
      font-size: 3rem;
      margin: 0;
    }

    p {
      font-size: 1.2rem;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    button {
      margin-top: 20px;
      padding: 15px 25px;
      font-size: 1rem;
      border: none;
      border-radius: 12px;
      background: #111;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    footer {
      margin-top: 60px;
      padding: 20px;
      color: #666;
    }
  </style>
</head>

<body>

  <header>
    <h1>Flèche-moi ça 🧩</h1>
    <p>Des mots fléchés en ligne, avec chrono et scores.</p>
  </header>

  <main class="container">
    <section class="card">
      <h2>Bienvenue sur le site</h2>
      <p>
        Le jeu arrive bientôt. Ici, tu pourras résoudre des grilles,
        comparer tes temps et tenter de battre les meilleurs scores.
      </p>

      <button onclick="alert('La première grille arrive bientôt 😄')">
        Jouer
      </button>
    </section>
  </main>

  <footer>
    © 2026 Flèche-moi ça — contact@flechemoica.fr
  </footer>

</body>
</html>
