<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flèche-moi ça</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="/assets/images/favicon.ico?">
  <link rel="apple-touch-icon" href="/assets/images/icon.png?">
  <meta name="theme-color" content="#d3c9f5">
</head>
<script>
  document.addEventListener('contextmenu', (event) => {
    event.preventDefault();
  });
</script>
<body>
  <div class="xp-desktop">
    <div class="xp-window">

      <div class="xp-titlebar">
        <div class="xp-title">
          <img src="/assets/images/icon.png?v=9" alt="" class="titlebar-icon">
          <span>Flèche-moi ça.exe</span>
        </div>

        <div class="xp-window-buttons">
          <button aria-label="Réduire">_</button>
          <button aria-label="Agrandir">□</button>
          <button aria-label="Fermer">×</button>
        </div>
      </div>

      <div class="xp-menu-bar">
        <a href="/" class="menu-link">Accueil</a>
        <a href="/grilletest.html" class="menu-link">Essayer</a>
        <a href="mailto:contact@flechemoica.fr" class="menu-contact" aria-label="Envoyer un mail">✉@</a>
        <a href="https://www.instagram.com/" class="menu-contact" target="_blank" rel="noopener noreferrer" aria-label="Instagram">Instagram</a>
        <a href="https://www.tiktok.com/" class="menu-contact" target="_blank" rel="noopener noreferrer" aria-label="TikTok">TikTok</a>
      </div>

      <header class="xp-header">
        <img src="/assets/images/logo.png?v=9" alt="Flèche-moi ça" class="main-logo">
      </header>

      <main class="container">
        <section class="card">
          <h2>Ça arrive bientôt !</h2>

          <p>
            En attendant, tu peux envoyer un Wizz.
          </p>

          <p class="wizz-counter">
            Wizz envoyés : <span id="wizz-count">0</span>
          </p>

          <button class="xp-button wizz-button" id="wizz-button" type="button" aria-label="Envoyer un Wizz">
            🫨
          </button>
        </section>
      </main>

      <footer class="site-footer">
        <span>© 2026 Flèche-moi ça</span>
        <a href="/mentions-legales.html">Mentions légales</a>
      </footer>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://tkgvmiykmoflzufjluwt.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_H0i2NDlNl110RYm2uoGcOQ_SB1XMd0J';

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let wizzRowId = null;
    const wizzButton = document.getElementById('wizz-button');
    const wizzCount = document.getElementById('wizz-count');

    async function loadCount() {
      const { data, error } = await client
        .from('wizz')
        .select('id, count')
        .limit(1)
        .single();

      if (error) {
        console.error('Erreur chargement Wizz :', error);
        return;
      }

      if (data) {
        wizzRowId = data.id;
        wizzCount.textContent = data.count;
      }
    }

    async function incrementCount() {
      if (wizzRowId === null) {
        await loadCount();
      }

      const current = Number(wizzCount.textContent || 0);
      const newCount = current + 1;

      wizzCount.textContent = newCount;

      const { error } = await client
        .from('wizz')
        .update({ count: newCount })
        .eq('id', wizzRowId);

      if (error) {
        console.error('Erreur mise à jour Wizz :', error);
        wizzCount.textContent = current;
      }
    }

    loadCount();

    wizzButton.addEventListener('click', async () => {
      await incrementCount();

      document.body.classList.remove('wizzing');
      void document.body.offsetWidth;
      document.body.classList.add('wizzing');

      setTimeout(() => {
        document.body.classList.remove('wizzing');
      }, 600);
    });
  </script>
</body>
</html>
